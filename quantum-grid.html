<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>QuantumGrid</title>

<!-- FONT SCI-FI -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
/* SFONDO STELLATO ANIMATO */
body {
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    background: radial-gradient(ellipse at bottom, #0f172a 0%, #000 100%);
    overflow: hidden;
    overflow-y: auto; 
}

/* PARTICELLE STELLE */
body::before {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: transparent;
    box-shadow:
        50vw 10vh #fff,
        20vw 50vh #fff,
        80vw 30vh #fff,
        10vw 70vh #fff,
        90vw 80vh #fff,
        30vw 20vh #fff,
        60vw 60vh #fff;
    animation: twinkle 3s infinite alternate;
    pointer-events: none; 
}
@keyframes twinkle {
    0% {opacity: 0.4;}
    100% {opacity: 1;}
}

/* TITOLO */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    letter-spacing: 5px;
    text-shadow: 0 0 15px #3b82f6, 0 0 30px #3b82f6;
    margin-top: 20px;
    text-align: center;
}

/* SOTTOTITOLO */
#subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    opacity: 0.85;
    text-align: center;
    margin-bottom: 10px;
}

/* CONTAINER DEL GIOCO */
#gameContainer {
    background: rgba(17,24,39,0.9);
    padding: 20px;
    border-radius: 12px;
    width: max-content;
    box-shadow: 0 0 25px rgba(0,0,255,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* GRIGLIA */
#grid {
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(10, 48px);
    grid-template-rows: repeat(10, 48px);
    gap: 5px;
}

/* CASELLE */
.cell {
    width: 48px;
    height: 48px;
    background: #1f2937;
    border-radius: 6px;
    transition: 0.2s, box-shadow 0.3s;
    cursor: pointer;
}
.cell:hover {
    transform: scale(1.1);
}

/* CASSELLE COLORATE */
.filled { 
    background: #22c55e; 
    box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e inset; /* glow fisso */
    animation: none;
}
.current { 
    background: #22c55e; /* verde di base */
    box-shadow: 0 0 15px #22c55e, 0 0 25px #22ff7a inset;
    animation: pulse-current 1s infinite alternate;
}

@keyframes pulse-current {
    0% { box-shadow: 0 0 10px #22c55e, 0 0 20px #22ff7a inset; }
    50% { box-shadow: 0 0 20px #22ff7a, 0 0 30px #22c55e inset; }
    100% { box-shadow: 0 0 10px #22c55e, 0 0 20px #22ff7a inset; }
}
.valid { 
    background: #3b82f6; 
    box-shadow: 0 0 15px #3b82f6, 0 0 25px #3b82f6 inset;
}

@keyframes pulse {
    0% {box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e inset;}
    100% {box-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e inset;}
}
@keyframes pulse-new {
    0% { box-shadow: 0 0 5px #22c55e, 0 0 10px #22ff7a inset; }
    50% { box-shadow: 0 0 20px #22ff7a, 0 0 40px #22c55e inset; }
    100% { box-shadow: 0 0 5px #22c55e, 0 0 10px #22ff7a inset; }
}
/* PANEL PUNTEGGIO */
#panel {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-top: 10px;
}

/* PULSANTI */
button {
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
    font-weight: 600;
    margin-top: 15px;
    padding: 10px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
button:hover { background: #818cf8; }

/* REGOLE DEL GIOCO */
#rules {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    letter-spacing: 0.5px;
    text-align: center;
    margin-top: 10px;
    opacity: 0.85;
}

#gameOverOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none; /* nascosto di default */
    justify-content: center;
    align-items: center;
    z-index: 2; /* sopra la griglia */
}

#gameOverContent {
    background: rgba(17,24,39,0.95);
    padding: 30px 50px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 40px #3b82f6, 0 0 80px #22c55e inset;
    animation: glowOverlay 1.5s infinite alternate;
}

#gameOverContent h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    color: #3b82f6;
    margin-bottom: 20px;
}

#gameOverContent p {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    margin-bottom: 25px;
    color: #22c55e;
}

#gameOverContent button {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
#gameOverContent button:hover { background: #818cf8; }

@keyframes glowOverlay {
    0% { box-shadow: 0 0 20px #3b82f6, 0 0 40px #22c55e inset; }
    50% { box-shadow: 0 0 40px #22c55e, 0 0 60px #3b82f6 inset; }
    100% { box-shadow: 0 0 20px #3b82f6, 0 0 40px #22c55e inset; }
}
</style>
</head>

<body>
<div id="stars"></div>

<h1>QuantumGrid</h1>
<div id="subtitle">Salta nella griglia e riempi più caselle possibile</div>

<div id="gameContainer">

<div id="grid"></div>
<div id="gameOverOverlay">
  <div id="gameOverContent">
    <h2>Partita Finita!</h2>
    <p>Hai riempito <span id="finalScore">0</span> caselle</p>
    <button onclick="restartGame()">Ricomincia</button>
  </div>
</div>
<div id="panel">
Caselle riempite: <span id="score">0</span>
</div>

<button onclick="startGame()">Nuova partita</button>

<div id="rules">
Prima scegli la casella iniziale.<br>
Poi puoi saltare di <b>3 orizzontale/verticale</b> o <b>2 diagonale</b>.
</div>
</div>

<script>
const size = 10;
let grid = [];
let current = null;
let score = 0;
let firstMove = true;

const moves = [
[0,3],[0,-3],[3,0],[-3,0],
[2,2],[2,-2],[-2,2],[-2,-2]
];

const gridDiv = document.getElementById("grid");

function createGrid() {
    gridDiv.innerHTML="";
    for(let r=0;r<size;r++){
        grid[r]=[];
        for(let c=0;c<size;c++){
            grid[r][c]=0;
            const cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=r;
            cell.dataset.c=c;
            cell.onclick=handleClick;
            gridDiv.appendChild(cell);
        }
    }
}

function startGame() {
    createGrid();
    score=0;
    firstMove=true;
    current=null;
    document.getElementById("score").innerText=score;
}

function handleClick(){
    let r=parseInt(this.dataset.r);
    let c=parseInt(this.dataset.c);

    if(firstMove){
        grid[r][c]=1;
        current=[r,c];
        score=1;
        firstMove=false;
        updateScore();
        updateBoard();
        return;
    }

    if(!this.classList.contains("valid")) return;

    grid[r][c]=1;
    current=[r,c];
    score++;
    updateScore();
    updateBoard();
}

function updateScore(){
    document.getElementById("score").innerText=score;
}

function validMoves(r,c){
    let res=[];
    for(let m of moves){
        let nr=r+m[0];
        let nc=c+m[1];
        if(nr>=0 && nr<size && nc>=0 && nc<size && grid[nr][nc]==0){
            res.push([nr,nc]);
        }
    }
    return res;
}

function updateBoard(){
    const cells=document.querySelectorAll(".cell");
    cells.forEach(cell=>cell.classList.remove("filled","current","valid"));

    for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
            let index=r*size+c;
            let cell=cells[index];
            if(grid[r][c]==1){ cell.classList.add("filled"); }
        }
    }

    if(current){
        let [r,c]=current;
        cells[r*size+c].classList.add("current");

        let moves = validMoves(r,c);
        moves.forEach(m=>{
            let index=m[0]*size+m[1];
            cells[index].classList.add("valid");
        });

        if(moves.length==0){
    	    setTimeout(()=>{ showGameOver(); }, 200);
	}
    }
}

function showGameOver(){
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOverOverlay').style.display = 'flex';
}

function restartGame(){
    document.getElementById('gameOverOverlay').style.display = 'none';
    startGame();
}

// STELLE
function createStars(numStars=100){
    const container = document.getElementById('stars');
    container.style.position = 'fixed';
    container.style.top = 0;
    container.style.left = 0;
    container.style.width = '100%';
    container.style.height = '100%';
    container.style.zIndex = 0; // dietro tutto
    container.style.pointerEvents = 'none';

    for(let i=0;i<numStars;i++){
        const star = document.createElement('div');
        star.style.position = 'absolute';
        star.style.width = '2px';
        star.style.height = '2px';
        star.style.background = 'white';
        star.style.borderRadius = '50%';
        star.style.top = Math.random()*100 + 'vh';
        star.style.left = Math.random()*100 + 'vw';
        star.style.opacity = Math.random();
        star.style.animation = `twinkle ${1 + Math.random()*2}s infinite alternate`;
        container.appendChild(star);
    }
}

// Animazione twinkle
const style = document.createElement('style');
style.innerHTML = `
@keyframes twinkle {
    0% {opacity: 0.2;}
    50% {opacity: 1;}
    100% {opacity: 0.2;}
}`;
document.head.appendChild(style);

createStars(100);

startGame();
</script>

</body>
</html>
